name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install Ghostscript
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            brew install ghostscript
          else
            sudo apt-get update && sudo apt-get install -y ghostscript
          fi

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v -race -count=1 ./...

      - name: Test CLI flags
        run: |
          go build -o md2img ./cmd/md2img

          # Basic rendering
          echo "# Hello World" | ./md2img -o /tmp/test_basic.png
          echo "✓ Basic rendering"

          # Custom font
          echo "# Font Test" | ./md2img -o /tmp/test_font.png -font Times -font-size 16
          echo "✓ Custom font"

          # Custom DPI
          echo "# DPI Test" | ./md2img -o /tmp/test_dpi.png -dpi 100
          echo "✓ Custom DPI"

          # PDF output
          echo "# PDF Test" | ./md2img -o /tmp/test_output.pdf -pdf
          echo "✓ PDF output"

          # Custom colors
          echo "# Color Test" | ./md2img -o /tmp/test_colors.png \
            -text-color "#333333" \
            -heading-color "#006600" \
            -table-header-bg "#003366" \
            -table-header-fg "#ffffff" \
            -code-bg "#1a1a1a" \
            -hr-color "#cc0000" \
            -blockquote-line-color "#ff6600" \
            -blockquote-text-color "#555555"
          echo "✓ Custom colors"

          # Custom margins
          echo "# Margin Test" | ./md2img -o /tmp/test_margin.png -margin 30
          echo "✓ Custom margins"

          # Custom page size (US Letter)
          echo "# Letter Size" | ./md2img -o /tmp/test_letter.png -page-w 215.9 -page-h 279.4
          echo "✓ Custom page size"

          # Table rendering
          echo -e "| Name | Score |\n|------|-------|\n| Alice | 95 |\n| Bob | 87 |" | ./md2img -o /tmp/test_table.png \
            -table-header-bg "#2d3748" \
            -table-header-fg "#e2e8f0"
          echo "✓ Table rendering"

          # Code block rendering
          printf 'go\nfmt.Println("hello")\n' | ./md2img -o /tmp/test_code.png -code-bg "#2d2d2d" -code-font Courier
          echo "✓ Code block rendering"

          # Trim whitespace
          echo -e "| A | B |\n|---|---|\n| 1 | 2 |" | ./md2img -o /tmp/test_trim.png -trim
          echo "✓ Trim whitespace"

          # Version flag
          ./md2img -version
          echo "✓ Version flag"

          # Error handling
          ./md2img -bogus - 2>&1 && echo "FAIL: should have errored" || echo "✓ Unknown flag error"
          ./md2img -dpi notanumber - 2>&1 && echo "FAIL: should have errored" || echo "✓ Invalid DPI error"
          ./md2img -text-color "badcolor" - 2>&1 && echo "FAIL: should have errored" || echo "✓ Invalid color error"

          rm -f ./md2img
          echo ""
          echo "All CLI flag tests passed on ${{ runner.os }}!"
